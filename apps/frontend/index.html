<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      @font-face { font-family: 'Plus Jakarta Sans'; font-style: normal; font-display: swap; font-weight: 200 800; src: url(/fonts/plus-jakarta-sans-latin-normal.woff2) format('woff2'); }
      @font-face { font-family: 'Plus Jakarta Sans'; font-style: italic; font-display: swap; font-weight: 200 800; src: url(/fonts/plus-jakarta-sans-latin-italic.woff2) format('woff2'); }
      @font-face { font-family: 'Maple Mono'; font-style: normal; font-display: swap; font-weight: 400; src: url(/fonts/maple-mono-400.woff2) format('woff2'); }
      @font-face { font-family: 'Maple Mono'; font-style: normal; font-display: swap; font-weight: 500; src: url(/fonts/maple-mono-500.woff2) format('woff2'); }
      @font-face { font-family: 'Maple Mono'; font-style: normal; font-display: swap; font-weight: 600; src: url(/fonts/maple-mono-600.woff2) format('woff2'); }
    </style>
    <title>BitK</title>
    <script>
      // Prevent flash of wrong theme
      ;(function () {
        var t = localStorage.getItem('bitk-theme')
        var dark =
          t === 'dark' ||
          (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
